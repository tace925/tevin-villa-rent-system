<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supabase Test</title>
  <script src="supabase.min.js"></script>
</head>
<body style="font-family:sans-serif; padding:40px; background:#0f172a; color:white;">

  <h2>Supabase Connection Test</h2>
  <p>Click "Test Save" → check if a new row appears in Supabase Table Editor → tenants table</p>

  <button onclick="testSave()">Test Save Tenant</button>
  <button onclick="testLoad()">Test Load Tenants</button>

  <pre id="result" style="margin-top:30px; padding:20px; background:#1e293b; border-radius:8px; min-height:100px;"></pre>

  <script>
    // === PASTE YOUR REAL VALUES HERE ===
    const SUPABASE_URL = 'https://hpepaznisbxfqjwaocpa.supabase.co';     // ← your URL
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwZXBhem5pc2J4ZnFqd2FvY3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTQ4NjgsImV4cCI6MjA4NzUzMDg2OH0.DxvYkJ4YG_esK2_LNWqcfp0tiin3mloFXVLDqVczcZI'; // ← YOUR FULL anon key

    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Test saving one tenant
    async function testSave() {
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = 'Saving...';

      const testTenant = {
        name: 'Test Tenant ' + Date.now(),
        email: 'test' + Date.now() + '@example.com',
        phone: '+254999999999',
        unit: 'TEST-001',
        rent: 10000,
        status: 'Pending'
      };

      const { data, error } = await supabase
        .from('tenants')
        .insert([testTenant])
        .select();

      if (error) {
        resultDiv.textContent = 'ERROR:\n' + JSON.stringify(error, null, 2);
        console.error(error);
      } else {
        resultDiv.textContent = 'SUCCESS! Saved:\n' + JSON.stringify(data, null, 2);
        alert('Saved! Check Supabase table now.');
      }
    }

    // Test loading all tenants
    async function testLoad() {
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = 'Loading...';

      const { data, error } = await supabase
        .from('tenants')
        .select('*')
        .limit(5);

      if (error) {
        resultDiv.textContent = 'ERROR:\n' + JSON.stringify(error, null, 2);
      } else {
        resultDiv.textContent = 'Loaded ' + data.length + ' tenants:\n' + JSON.stringify(data, null, 2);
      }
    }
  </script>

</body>
</html>
