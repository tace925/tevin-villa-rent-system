<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tevin,s Villa - Tenants</title>
  
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="tenants.css">
  <!-- Remove type="module" and use this instead -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="js/tenants-simple.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gray-950 border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center">
          <div class="text-purple-500 font-bold text-xl">TEVIN'S VILLA</div>
        </div>
        <div class="flex space-x-8">
          <a href="index.html" class="hover:text-purple-400">Home</a>
          <a href="dashboard.html" class="hover:text-purple-400">Dashboard</a>
          <a href="tenants.html" class="text-purple-400 border-b-2 border-purple-500">Tenants</a>
          <a href="payment.html" class="hover:text-purple-400">Payments</a>
          <a href="help.html" class="hover:text-purple-400">Help & Info</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div class="bg-gray-800 rounded-lg p-6 shadow-lg mb-8">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Tenants Management</h2>
        <button id="refreshBtn" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm flex items-center gap-2">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>
      <p class="text-gray-400 text-sm mb-6">
        Tenant list & photo upload functionality (Local Storage)
      </p>

      <!-- Add Tenant Button -->
      <div class="mb-6">
        <button id="addTenantBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg flex items-center gap-2 font-medium">
          <i class="fas fa-plus"></i> Add New Tenant
        </button>
      </div>

      <!-- Tenants Table -->
      <div class="bg-gray-900 rounded-lg overflow-hidden border border-gray-700">
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-800">
              <tr>
                <th class="px-6 py-4">PHOTO</th>
                <th class="px-6 py-4">NAME</th>
                <th class="px-6 py-4">EMAIL</th>
                <th class="px-6 py-4">PHONE</th>
                <th class="px-6 py-4">UNIT</th>
                <th class="px-6 py-4">RENT (KES)</th>
                <th class="px-6 py-4">STATUS</th>
                <th class="px-6 py-4">ACTIONS</th>
              </tr>
            </thead>
            <tbody id="tenantsTableBody">
              <tr>
                <td colspan="8" class="text-center py-12 text-gray-500">
                  <div class="flex flex-col items-center">
                    <i class="fas fa-users text-4xl mb-3 text-gray-600"></i>
                    <p id="loadingMessage">Loading tenants...</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Add Tenant Modal -->
  <div id="tenantModal" class="modal hidden">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">Add New Tenant</h3>
        <button id="closeModalBtn" class="text-gray-400 hover:text-white">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <form id="tenantForm">
        <div class="space-y-4">
          <!-- Photo Upload -->
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Tenant Photo (optional)</label>
            <div class="flex items-center gap-4">
              <div id="photoPreview" class="photo-preview">
                <i class="fas fa-camera text-gray-500"></i>
              </div>
              <input type="file" id="tenantPhoto" accept="image/*" class="hidden">
              <button type="button" id="choosePhotoBtn" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">
                Choose File
              </button>
              <span id="fileName" class="text-sm text-gray-400">No file chosen</span>
            </div>
          </div>
          
          <!-- Name -->
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Full Name *</label>
            <input type="text" id="tenantName" required class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-purple-500">
          </div>
          
          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Email *</label>
            <input type="email" id="tenantEmail" required class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-purple-500">
          </div>
          
          <!-- Phone -->
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Phone *</label>
            <input type="tel" id="tenantPhone" required class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-purple-500">
          </div>
          
          <!-- Unit -->
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Unit Number *</label>
            <input type="text" id="tenantUnit" required value="A-001" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-purple-500">
          </div>
          
          <!-- Rent Amount -->
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Monthly Rent (KES) *</label>
            <input type="number" id="tenantRent" required value="15000" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-purple-500">
          </div>
          
          <!-- Status -->
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Status</label>
            <select id="tenantStatus" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-purple-500">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
              <option value="Pending">Pending</option>
            </select>
          </div>
        </div>
        
        <div class="flex justify-end gap-3 mt-6">
          <button type="button" id="cancelBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded">Save Tenant</button>
        </div>
      </form>
    </div>
  </div>

  <!-- JavaScript -->
  <script type="module" src="js/tenant.js"></script>
</body>
</html>
